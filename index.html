<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QB irritated | Premium Store</title>
    <style>
        :root {
            --bg-color: #050505;
            --accent-red: #ff0000;
            --text-white: #ffffff;
            --admin-gold: #ffd700;
            --card-bg: #0f0f0f;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body { 
            margin: 0; 
            font-family: 'Courier New', Courier, monospace; 
            background-color: var(--bg-color); 
            color: var(--text-white); 
            overflow-x: hidden;
        }

        /* --- АНИМАЦИИ --- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes toastIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* --- УВЕДОМЛЕНИЯ (TOASTS) --- */
        #toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
        }

        .toast {
            background: #111;
            border-left: 4px solid var(--accent-red);
            color: white;
            padding: 15px 25px;
            margin-bottom: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            animation: toastIn 0.3s ease forwards;
            min-width: 200px;
            text-transform: uppercase;
            font-size: 12px;
        }

        /* --- ШАПКА --- */
        header { 
            padding: 15px 40px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #1a1a1a; 
            position: sticky; 
            top: 0; 
            background: rgba(5,5,5,0.8); 
            backdrop-filter: blur(10px); 
            z-index: 900; 
        }

        .logo { 
            font-size: 1.5rem; 
            font-weight: bold; 
            letter-spacing: 5px; 
            cursor: pointer;
            transition: var(--transition);
        }
        .logo:hover { color: var(--accent-red); text-shadow: 0 0 10px var(--accent-red); }

        .cart-icon { cursor: pointer; position: relative; font-size: 1.4rem; transition: 0.2s; }
        .cart-icon:hover { transform: scale(1.1); }
        #cart-count { 
            position: absolute; top: -8px; right: -10px; 
            background: var(--accent-red); color: white; 
            font-size: 9px; padding: 2px 5px; border-radius: 50%; 
        }

        /* --- МЕНЮ (Анимированное) --- */
        .side-menu { 
            position: fixed; 
            top: 0; right: -350px; 
            width: 320px; height: 100%; 
            background: rgba(0,0,0,0.95); 
            transition: var(--transition); 
            padding: 80px 30px; 
            z-index: 1000; 
            border-left: 1px solid #222;
        }
        .side-menu.active { right: 0; box-shadow: -10px 0 30px rgba(0,0,0,0.8); }

        .menu-link { 
            padding: 18px 0; 
            border-bottom: 1px solid #111; 
            cursor: pointer; 
            transition: 0.3s;
            font-size: 1.1rem;
        }
        .menu-link:hover { color: var(--accent-red); padding-left: 10px; }

        .submenu { 
            max-height: 0; 
            overflow: hidden; 
            transition: max-height 0.5s ease; 
            background: #080808; 
        }
        .submenu.open { max-height: 500px; padding-bottom: 10px; }
        .submenu div { padding: 12px 20px; color: #666; cursor: pointer; transition: 0.2s; }
        .submenu div:hover { color: white; background: #111; }

        /* --- КАРТОЧКИ --- */
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 25px; 
            animation: fadeInUp 0.8s ease;
        }

        .card { 
            background: var(--card-bg); 
            border: 1px solid #151515; 
            cursor: pointer; 
            transition: var(--transition); 
            overflow: hidden;
        }
        .card:hover { 
            border-color: var(--accent-red); 
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .card-img { width: 100%; height: 380px; object-fit: cover; transition: 0.5s; }
        .card:hover .card-img { transform: scale(1.05); }

        /* --- ДЕТАЛЬНАЯ СТРАНИЦА --- */
        #product-page, #cart-page { 
            display: none; 
            position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: var(--bg-color); 
            z-index: 950; 
            overflow-y: auto; padding: 60px 40px; 
            box-sizing: border-box;
            animation: fadeInUp 0.4s ease;
        }

        /* --- КНОПКИ --- */
        button { 
            background: var(--accent-red); 
            color: white; border: none; 
            padding: 15px; cursor: pointer; 
            font-weight: bold; letter-spacing: 2px;
            transition: 0.3s;
        }
        button:hover { background: #b30000; letter-spacing: 4px; }
        .btn-back { background: transparent; border: 1px solid #333; width: auto; margin-bottom: 30px; }

        input, select, textarea { 
            background: #000; border: 1px solid #222; color: white; 
            padding: 12px; margin-bottom: 15px; width: 100%; box-sizing: border-box;
        }

        #admin-panel { display: none; border: 1px dashed var(--admin-gold); padding: 25px; margin-bottom: 40px; }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div id="auth-overlay">
    <div class="auth-box">
        <h2 style="letter-spacing: 5px;">QB IRRITATED</h2>
        <input type="text" id="loginField" placeholder="ЛОГИН">
        <input type="password" id="passField" placeholder="ПАРОЛЬ">
        <button onclick="handleAuth()">ВХОД</button>
    </div>
</div>

<header>
    <div class="logo" onclick="closeAllPages()">QB IRRITATED</div>
    <div class="nav-icons">
        <div class="cart-icon" onclick="openCart()">🛒 <span id="cart-count">0</span></div>
        <div class="menu-btn" onclick="toggleMenu()">
            <div style="width: 30px;"></div><div style="width: 20px; align-self: flex-end;"></div><div style="width: 30px;"></div>
        </div>
    </div>
</header>

<div id="cart-page">
    <button class="btn-back" onclick="closeAllPages()">← BACK</button>
    <h1>CART</h1>
    <div id="cart-items-list"></div>
    <div id="cart-total-display" style="font-size: 2rem; margin-top: 30px; border-top: 1px solid #222; padding-top: 20px;"></div>
    <button style="width: 300px; margin-top: 40px;" onclick="showToast('Заказ в обработке...')">ORDER NOW</button>
</div>

<div id="product-page">
    <button class="btn-back" onclick="closeAllPages()">← BACK TO COLLECTION</button>
    <div id="product-detail-content"></div>
</div>

<div class="side-menu" id="sideMenu">
    <div class="menu-link" onclick="toggleSub('sub1')">COLLECTION ▼</div>
    <div class="submenu" id="sub1">
        <div onclick="switchPage('all')">ALL ITEMS</div>
        <div onclick="switchPage('Футболки')">T-SHIRTS</div>
        <div onclick="switchPage('Зип-Худи')">ZIP-HOODIES</div>
        <div onclick="switchPage('Худи')">HOODIES</div>
    </div>
    <div class="menu-link" onclick="toggleSub('sub2')">SOCIAL ▼</div>
    <div class="submenu" id="sub2">
        <div onclick="window.open('https://t.me/irritateds')">TELEGRAM</div>
        <div onclick="window.open('https://tiktok.com/irritatedly')">TIKTOK</div>
    </div>
    <button onclick="location.reload()" style="background: #111; margin-top: 100px;">LOGOUT</button>
</div>

<div class="container" id="main-container">
    <div id="admin-panel">
        <h3 style="color: var(--admin-gold); letter-spacing: 2px;">ADMIN PANEL</h3>
        <input type="file" id="pImage" onchange="processImage(this)">
        <input type="text" id="pName" placeholder="НАЗВАНИЕ">
        <input type="number" id="pPrice" placeholder="ЦЕНА">
        <textarea id="pDesc" placeholder="ОПИСАНИЕ ТОВАРА" rows="4"></textarea>
        <select id="pCat">
            <option value="Футболки">ФУТБОЛКИ</option>
            <option value="Зип-Худи">ЗИП-ХУДИ</option>
            <option value="Худи">ХУДИ</option>
        </select>
        <button onclick="addProduct()">PUBLISH ITEM</button>
    </div>
    <h2 id="page-title" style="letter-spacing: 3px; font-size: 0.9rem; color: #444; margin-bottom: 40px;">// LATEST_COLLECTION</h2>
    <div class="product-grid" id="productGrid"></div>
</div>

<script>
    let products = JSON.parse(localStorage.getItem('qb_v5_items')) || [];
    let cart = JSON.parse(localStorage.getItem('qb_cart')) || [];
    let currentUser = null;
    let currentResizedImage = null;

    // --- СИСТЕМА УВЕДОМЛЕНИЙ (TOASTS) ---
    function showToast(text) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = text;
        container.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    // --- АНИМАЦИИ И ПЕРЕКЛЮЧЕНИЯ ---
    function toggleMenu() { 
        document.getElementById('sideMenu').classList.toggle('active'); 
    }

    function toggleSub(id) {
        const el = document.getElementById(id);
        el.classList.toggle('open');
    }

    function openProduct(id) {
        const p = products.find(x => x.id === id);
        const page = document.getElementById('product-page');
        document.getElementById('product-detail-content').innerHTML = `
            <div style="display: flex; gap: 60px; flex-wrap: wrap;">
                <img src="${p.image}" style="width: 450px; height: 600px; object-fit: cover; border: 1px solid #1a1a1a;">
                <div style="flex: 1; min-width: 300px;">
                    <h1 style="letter-spacing: 5px; margin: 0 0 10px 0;">${p.name.toUpperCase()}</h1>
                    <p style="color: var(--accent-red); font-size: 2.5rem; font-weight: bold;">${p.price} KZT</p>
                    <p style="color: #666; line-height: 1.8; margin: 40px 0;">${p.desc}</p>
                    <button onclick="addToCart(${p.id})">ADD TO CART</button>
                </div>
            </div>
        `;
        page.style.display = 'block';
        document.getElementById('main-container').style.display = 'none';
        window.scrollTo(0, 0);
    }

    function closeAllPages() {
        document.getElementById('product-page').style.display = 'none';
        document.getElementById('cart-page').style.display = 'none';
        document.getElementById('main-container').style.display = 'block';
        renderProducts();
    }

    // --- КОРЗИНА ---
    function addToCart(id) {
        const p = products.find(x => x.id === id);
        cart.push(p);
        updateCartUI();
        showToast("ADDED TO CART");
    }

    function openCart() {
        document.getElementById('cart-page').style.display = 'block';
        document.getElementById('main-container').style.display = 'none';
        renderCartItems();
    }

    function renderCartItems() {
        const list = document.getElementById('cart-items-list');
        list.innerHTML = '';
        let total = 0;
        cart.forEach((item, index) => {
            total += Number(item.price);
            list.innerHTML += `
                <div style="display: flex; justify-content: space-between; padding: 20px 0; border-bottom: 1px solid #111; align-items: center;">
                    <div style="display: flex; gap: 20px; align-items: center;">
                        <img src="${item.image}" style="width: 60px; height: 80px; object-fit: cover;">
                        <div>
                            <div style="font-weight: bold; letter-spacing: 2px;">${item.name}</div>
                            <div style="color: var(--accent-red);">${item.price} KZT</div>
                        </div>
                    </div>
                    <button onclick="removeFromCart(${index})" style="width: auto; padding: 5px 15px; background: #111; font-size: 10px;">REMOVE</button>
                </div>
            `;
        });
        document.getElementById('cart-total-display').innerText = `TOTAL: ${total} KZT`;
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        updateCartUI();
        renderCartItems();
        showToast("REMOVED");
    }

    function updateCartUI() {
        document.getElementById('cart-count').innerText = cart.length;
        localStorage.setItem('qb_cart', JSON.stringify(cart));
    }

    // --- РЕНДЕР И АДМИН ---
    function renderProducts(category = 'all') {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = '';
        const filtered = category === 'all' ? products : products.filter(p => p.cat === category);

        filtered.forEach(p => {
            const isAdmin = currentUser && currentUser.role === 'admin';
            grid.innerHTML += `
                <div class="card" onclick="openProduct(${p.id})">
                    <img src="${p.image}" class="card-img">
                    <div class="card-info">
                        <div class="card-price">${p.price} KZT</div>
                    </div>
                    ${isAdmin ? `<button onclick="event.stopPropagation(); deleteItem(${p.id})" style="background:#111; font-size:9px; height:30px; padding:0;">DELETE</button>` : ''}
                </div>
            `;
        });
        updateCartUI();
    }

    function addProduct() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const desc = document.getElementById('pDesc').value;
        const cat = document.getElementById('pCat').value;

        if(!name || !price || !currentResizedImage) return showToast("ERROR: FILL ALL FIELDS");

        products.push({ id: Date.now(), name, price, desc, cat, image: currentResizedImage });
        localStorage.setItem('qb_v5_items', JSON.stringify(products));
        showToast("PUBLISHED SUCCESSFULLY");
        closeAllPages();
    }

    function deleteItem(id) {
        products = products.filter(p => p.id !== id);
        localStorage.setItem('qb_v5_items', JSON.stringify(products));
        renderProducts();
        showToast("ITEM DELETED");
    }

    function processImage(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 600; canvas.height = (img.height * 600) / img.width;
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                currentResizedImage = canvas.toDataURL('image/jpeg', 0.6);
                showToast("IMAGE READY");
            };
        };
        reader.readAsDataURL(input.files[0]);
    }

    // --- АВТОРИЗАЦИЯ ---
    function handleAuth() {
        const login = document.getElementById('loginField').value;
        if(login === 'kybiiiuh') {
            currentUser = { login: 'kybiiiuh', role: 'admin' };
            document.getElementById('admin-panel').style.display = 'block';
            showToast("WELCOME MASTER");
        } else {
            currentUser = { login: login || 'guest', role: 'user' };
            showToast("SIGNED IN AS GUEST");
        }
        document.getElementById('auth-overlay').style.display = 'none';
        renderProducts();
    }

    function switchPage(cat) {
        document.getElementById('page-title').innerText = `// CATEGORY_${cat.toUpperCase()}`;
        renderProducts(cat);
        toggleMenu();
    }
</script>

</body>
</html>
