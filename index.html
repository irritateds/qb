<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QB IRRITATED</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{background:#000;color:#fff;}

/* HEADER */
header{
position:fixed;
width:100%;
display:flex;
justify-content:space-between;
padding:20px;
background:rgba(0,0,0,0.6);
}

.logo{letter-spacing:5px;font-weight:bold;}

nav a{color:#aaa;text-decoration:none;font-size:12px;}

/* HERO */
.hero{
height:80vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{font-size:50px;letter-spacing:10px;}
.hero p{color:#777;margin-top:10px;}

/* PRODUCTS */
.products{
padding:20px;
display:grid;
gap:40px;
}

.card{
border:1px solid #111;
padding:15px;
}

.card img{
width:100%;
height:300px;
object-fit:cover;
}

select, input{
width:100%;
margin-top:10px;
padding:10px;
background:#111;
color:white;
border:none;
}

button{
margin-top:10px;
padding:10px;
background:white;
color:black;
border:none;
font-weight:bold;
width:100%;
}

.socials{
text-align:center;
padding:30px;
}

.socials a{
margin:0 10px;
color:#aaa;
text-decoration:none;
}

</style>
</head>

<body>

<header>
<div class="logo">QB IRRITATED</div>
<nav>
<a href="#">DROP</a>
</nav>
</header>

<section class="hero">
<h1>QB IRRITATED</h1>
<p>LIMITED DROP</p>
</section>

<section class="products">

<div class="card">

<img src="https://picsum.photos/800/800?1">

<h3>MASK HOODIE — $79</h3>

<select id="size">
<option value="">Выбери размер</option>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<input type="text" id="name" placeholder="Твоё имя">

<input type="text" id="city" placeholder="Город">

<button onclick="order()">ORDER</button>

</div>

</section>

<div class="socials">
<a href="https://instagram.com" target="_blank">INSTAGRAM</a>
<a href="https://t.me/yourusername" target="_blank">TELEGRAM</a>
<a href="https://tiktok.com" target="_blank">TIKTOK</a>
</div>

<script>

function order(){

let size = document.getElementById("size").value;
let name = document.getElementById("name").value;
let city = document.getElementById("city").value;

if(size=="" || name=="" || city==""){
alert("Заполни все поля");
return;
}

let text = `Заказ QB IRRITATED:%0AТовар: MASK HOODIE%0AРазмер: ${size}%0AИмя: ${name}%0AГород: ${city}`;

window.open(`https://t.me/yourusername?text=${text}`, "_blank");

}

</script>

</body>
</html>
