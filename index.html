<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QB irritated | Store</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-red: #ff0000;
            --text-white: #e0e0e0;
            --admin-gold: #ffd700;
            --card-bg: #0f0f0f;
        }

        body { margin: 0; font-family: 'Courier New', Courier, monospace; background-color: var(--bg-color); color: var(--text-white); }

        /* Авторизация */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .auth-box { background: #111; padding: 30px; border: 1px solid var(--accent-red); text-align: center; width: 300px; }

        /* Шапка */
        header { padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; background: rgba(10,10,10,0.9); backdrop-filter: blur(5px); z-index: 900; }
        .logo { font-size: 1.5rem; font-weight: bold; letter-spacing: 3px; cursor: pointer; }
        .nav-icons { display: flex; gap: 20px; align-items: center; }
        .menu-btn { cursor: pointer; z-index: 1001; }
        .menu-btn div { width: 25px; height: 2px; background: white; margin: 5px; transition: 0.3s; }

        /* Меню */
        .side-menu { position: fixed; top: 0; right: -320px; width: 300px; height: 100%; background: rgba(0,0,0,0.98); transition: 0.4s; padding: 80px 20px; z-index: 1000; border-left: 1px solid #333; }
        .side-menu.active { right: 0; }
        .menu-link { padding: 15px 0; border-bottom: 1px solid #222; cursor: pointer; display: block; }
        .submenu { display: none; padding-left: 15px; background: #050505; }
        .submenu div { display: block; padding: 10px; color: #777; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
        .submenu div:hover { color: var(--accent-red); }

        /* Контент */
        .container { padding: 40px; min-height: 80vh; }
        .page-title { margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; border-left: 3px solid var(--accent-red); padding-left: 15px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }

        /* Карточка */
        .card { background: var(--card-bg); border: 1px solid #1a1a1a; display: flex; flex-direction: column; position: relative; }
        .card-img-wrapper { width: 100%; height: 320px; overflow: hidden; background: #000; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
        .card-content { padding: 15px; }
        .card-price { color: var(--accent-red); font-weight: bold; font-size: 1.2rem; }

        /* Админка */
        #admin-panel { display: none; background: #151515; padding: 20px; margin-bottom: 30px; border: 1px dashed var(--admin-gold); }
        input, select { background: #000; border: 1px solid #333; color: white; padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        
        button { background: var(--accent-red); color: white; border: none; padding: 10px 20px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; }
        .btn-del { background: #222; font-size: 10px; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <h2 id="auth-title">ВХОД</h2>
        <input type="text" id="loginField" placeholder="Логин">
        <input type="password" id="passField" placeholder="Пароль">
        <button onclick="handleAuth()">ПОДТВЕРДИТЬ</button>
        <p style="font-size: 10px; cursor: pointer; margin-top: 15px; color: #666;" onclick="toggleAuthMode()" id="auth-toggle-text">Регистрация</p>
    </div>
</div>

<header>
    <div class="logo" onclick="switchPage('all')">QB IRRITATED</div>
    <div class="nav-icons">
        <div style="cursor: pointer;">🛒 <span id="cart-count">0</span></div>
        <div class="menu-btn" onclick="toggleMenu()">
            <div></div><div></div><div></div>
        </div>
    </div>
</header>

<div class="side-menu" id="sideMenu">
    <div id="userDisplay" style="font-size: 0.7rem; color: #444; margin-bottom: 20px;"></div>
    
    <div class="menu-link" onclick="toggleSub('sub1')">АССОРТИМЕНТ ▼</div>
    <div class="submenu" id="sub1">
        <div onclick="switchPage('all')">Все товары</div>
        <div onclick="switchPage('popular')">★ Популярное</div>
        <div onclick="switchPage('Футболки')">Футболки</div>
        <div onclick="switchPage('Зип-Худи')">Зип-Худи</div>
        <div onclick="switchPage('Худи')">Худи</div>
        <div onclick="switchPage('Лонгслив')">Лонгслив</div>
        <div onclick="switchPage('Свитшоты')">Свитшоты</div>
    </div>

    <div class="menu-link" onclick="toggleSub('sub2')">СОЦ СЕТИ ▼</div>
    <div class="submenu" id="sub2">
        <div onclick="window.open('https://t.me/irritateds')">Telegram</div>
        <div onclick="window.open('https://tiktok.com/irritatedly')">TikTok</div>
    </div>
    
    <button onclick="location.reload()" style="background: #222; margin-top: 40px;">ВЫЙТИ</button>
</div>

<div class="container">
    <div id="admin-panel">
        <h3 style="color: var(--admin-gold);">ДОБАВИТЬ ТОВАР</h3>
        <input type="file" id="pImage" accept="image/*" onchange="processImage(this)">
        <input type="text" id="pName" placeholder="Название">
        <input type="number" id="pPrice" placeholder="Цена (KZT)">
        <input type="text" id="pDesc" placeholder="Описание">
        
        <label style="font-size: 10px; color: #666;">Категория:</label>
        <select id="pCat">
            <option value="Футболки">Футболки</option>
            <option value="Зип-Худи">Зип-Худи</option>
            <option value="Худи">Худи</option>
            <option value="Лонгслив">Лонгслив</option>
            <option value="Свитшоты">Свитшоты</option>
        </select>
        
        <label style="display: block; margin-top: 10px; font-size: 12px;">
            <input type="checkbox" id="isPopular" style="width: auto;"> Отметить как Популярное
        </label>
        
        <button onclick="addProduct()">ОПУБЛИКОВАТЬ</button>
    </div>

    <h2 id="currentPageTitle" class="page-title">ВСЕ ТОВАРЫ</h2>
    <div class="product-grid" id="productGrid"></div>
</div>

<script>
    let currentUser = null;
    let products = JSON.parse(localStorage.getItem('qb_items_v3')) || [];
    let currentCategory = 'all';
    let currentResizedImage = null;

    // --- ФИЛЬТРАЦИЯ СТРАНИЦ ---
    function switchPage(cat) {
        currentCategory = cat;
        const titleMap = {
            'all': 'ВСЕ ТОВАРЫ',
            'popular': 'ПОПУЛЯРНОЕ 🔥',
            'Футболки': 'ФУТБОЛКИ',
            'Зип-Худи': 'ЗИП-ХУДИ',
            'Худи': 'ХУДИ',
            'Лонгслив': 'ЛОНГСЛИВЫ',
            'Свитшоты': 'СВИТШОТЫ'
        };
        document.getElementById('currentPageTitle').innerText = titleMap[cat] || cat;
        renderProducts();
        toggleMenu(); // Закрыть меню после выбора
    }

    // --- ЛОГИКА АДМИНА ---
    function addProduct() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const desc = document.getElementById('pDesc').value;
        const cat = document.getElementById('pCat').value;
        const isPop = document.getElementById('isPopular').checked;

        if(!name || !price) return alert("Заполни поля!");

        const newItem = {
            id: Date.now(),
            name, price, desc, cat,
            popular: isPop,
            image: currentResizedImage || "https://via.placeholder.com/300x400?text=NO+IMAGE"
        };

        products.push(newItem);
        localStorage.setItem('qb_items_v3', JSON.stringify(products));
        renderProducts();
        // Очистка
        document.getElementById('pName').value = '';
        document.getElementById('pPrice').value = '';
    }

    function deleteItem(id) {
        products = products.filter(p => p.id !== id);
        localStorage.setItem('qb_items_v3', JSON.stringify(products));
        renderProducts();
    }

    function renderProducts() {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = '';

        // Фильтруем массив перед отображением
        let filtered = products;
        if (currentCategory === 'popular') {
            filtered = products.filter(p => p.popular === true);
        } else if (currentCategory !== 'all') {
            filtered = products.filter(p => p.cat === currentCategory);
        }

        filtered.forEach(p => {
            const isAdmin = currentUser && currentUser.role === 'admin';
            grid.innerHTML += `
                <div class="card">
                    <div class="card-img-wrapper"><img src="${p.image}" class="card-img"></div>
                    <div class="card-content">
                        <h3 style="margin:0">${p.name}</h3>
                        <p style="font-size:0.8rem; color:#666">${p.desc}</p>
                        <p class="card-price">${p.price} KZT</p>
                        <button onclick="alert('Добавлено')">В КОРЗИНУ</button>
                        ${isAdmin ? `<button onclick="deleteItem(${p.id})" class="btn-del">УДАЛИТЬ</button>` : ''}
                    </div>
                </div>
            `;
        });
    }

    // --- СИСТЕМНЫЕ ФУНКЦИИ (Auth/Image) ---
    function processImage(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 600; canvas.height = (img.height * 600) / img.width;
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                currentResizedImage = canvas.toDataURL('image/jpeg', 0.7);
            };
        };
        reader.readAsDataURL(input.files[0]);
    }

    function handleAuth() {
        const login = document.getElementById('loginField').value;
        const pass = document.getElementById('passField').value;
        let users = JSON.parse(localStorage.getItem('qb_users')) || [];
        
        let user = users.find(u => u.login === login && u.pass === pass);
        if(!user && login === 'kybiiiuh') { // Авто-создание админа при первом входе
            user = {login: 'kybiiiuh', pass, role: 'admin'};
            users.push(user);
            localStorage.setItem('qb_users', JSON.stringify(users));
        }

        if(user) {
            currentUser = user;
            document.getElementById('auth-overlay').style.display = 'none';
            if(user.role === 'admin') document.getElementById('admin-panel').style.display = 'block';
            renderProducts();
        } else {
            alert("Ошибка доступа");
        }
    }

    function toggleAuthMode() { alert("Для тестов просто введите логин kybiiiuh и любой пароль"); }
    function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); }
    function toggleSub(id) {
        const el = document.getElementById(id);
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }
</script>

</body>
</html>
