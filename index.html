<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QB irritated | Private Store</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-red: #ff0000;
            --text-white: #e0e0e0;
            --admin-gold: #ffd700;
            --card-bg: #0f0f0f;
        }

        body { margin: 0; font-family: 'Courier New', Courier, monospace; background-color: var(--bg-color); color: var(--text-white); }

        /* Авторизация */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .auth-box { background: #111; padding: 30px; border: 1px solid var(--accent-red); text-align: center; width: 300px; }

        /* Шапка */
        header { padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; background: rgba(10,10,10,0.9); backdrop-filter: blur(5px); z-index: 900; }
        .logo { font-size: 1.5rem; font-weight: bold; letter-spacing: 3px; }
        .nav-icons { display: flex; gap: 20px; align-items: center; }
        .menu-btn { cursor: pointer; z-index: 1001; }
        .menu-btn div { width: 25px; height: 2px; background: white; margin: 5px; transition: 0.3s; }

        /* Меню */
        .side-menu { position: fixed; top: 0; right: -320px; width: 300px; height: 100%; background: rgba(0,0,0,0.98); transition: 0.4s; padding: 80px 20px; z-index: 1000; border-left: 1px solid #333; }
        .side-menu.active { right: 0; }
        .menu-link { padding: 15px 0; border-bottom: 1px solid #222; cursor: pointer; display: block; }
        .submenu { display: none; padding-left: 15px; background: #050505; }
        .submenu a { display: block; padding: 8px; color: #777; text-decoration: none; font-size: 0.9rem; }

        /* Сетка */
        .container { padding: 40px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }

        /* Карточка товара */
        .card { background: var(--card-bg); border: 1px solid #1a1a1a; transition: 0.3s; display: flex; flex-direction: column; position: relative; }
        .card:hover { border-color: var(--accent-red); }
        .card-img-wrapper { width: 100%; height: 300px; overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #1a1a1a; }
        .card-img { width: 100%; height: 100%; object-fit: cover; } /* Изображение заполняет блок */
        .card-content { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-title { font-size: 1.1rem; margin: 0 0 5px 0; }
        .card-price { color: var(--accent-red); font-weight: bold; font-size: 1.2rem; margin: 0 0 10px 0; }
        .card-desc { font-size: 0.8rem; color: #888; margin-bottom: 15px; flex-grow: 1; }

        /* Панель */
        #admin-panel { display: none; background: #151515; padding: 20px; margin-bottom: 30px; border: 1px dashed var(--admin-gold); }
        input, select { background: #000; border: 1px solid #333; color: white; padding: 10px; margin: 5px; width: calc(100% - 25px); box-sizing: border-box; }
        #file-status { font-size: 10px; color: #888; margin-left: 10px; }

        button { background: var(--accent-red); color: white; border: none; padding: 10px 20px; cursor: pointer; width: 100%; margin-top: 10px; text-transform: uppercase; font-weight: bold; }
        button:hover { opacity: 0.8; }
        .btn-del { background: #222; font-size: 10px; margin-top: 5px; color: #888; }
        .btn-del:hover { background: #333; color: white; }

        .user-info { font-size: 0.8rem; color: #555; margin-bottom: 20px; }
        .pop-badge { position: absolute; top: 10px; left: 10px; background: rgba(255,0,0,0.8); color: white; padding: 2px 6px; font-size: 9px; font-weight: bold; z-index: 10; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <h2 id="auth-title">ВХОД</h2>
        <input type="text" id="loginField" placeholder="Логин">
        <input type="password" id="passField" placeholder="Пароль">
        <button onclick="handleAuth()">ПОДТВЕРДИТЬ</button>
        <p style="font-size: 10px; cursor: pointer; margin-top: 15px; color: #666;" onclick="toggleAuthMode()" id="auth-toggle-text">Нет аккаунта? Регистрация</p>
    </div>
</div>

<header>
    <div class="logo">QB IRRITATED</div>
    <div class="nav-icons">
        <div style="cursor: pointer; position: relative;">🛒 <span id="cart-count">0</span></div>
        <div class="menu-btn" onclick="toggleMenu()">
            <div></div><div></div><div></div>
        </div>
    </div>
</header>

<div class="side-menu" id="sideMenu">
    <div class="user-info" id="userDisplay">STATUS: GUEST</div>
    <div class="menu-link" onclick="toggleSub('sub1')">АССОРТИМЕНТ ▼</div>
    <div class="submenu" id="sub1">
        <a href="#">Футболки</a><a href="#">Зип-Худи</a><a href="#">Худи</a><a href="#">Популярное</a>
    </div>
    <div class="menu-link" onclick="toggleSub('sub2')">СОЦ СЕТИ ▼</div>
    <div class="submenu" id="sub2">
        <a href="https://t.me/irritateds" target="_blank">Telegram</a><a href="https://tiktok.com/irritatedly" target="_blank">TikTok</a>
    </div>
    <button onclick="logout()" style="background: #222; margin-top: 50px; width: auto; padding: 10px;">ВЫЙТИ</button>
</div>

<div class="container">
    <div id="admin-panel">
        <h3 style="color: var(--admin-gold);">MODERATION | Добавление товара</h3>
        
        <div style="margin: 5px;">
            <label for="pImage" style="font-size: 12px; color: #aaa;">Фото товара (авто-сжатие):</label>
            <input type="file" id="pImage" accept="image/*" onchange="processImage(this)">
            <span id="file-status"></span>
        </div>

        <input type="text" id="pName" placeholder="Название вещи (например: Zip-Hoodie Chaos)">
        <input type="number" id="pPrice" placeholder="Цена (KZT)">
        <input type="text" id="pDesc" placeholder="Краткое описание">
        <select id="pCat">
            <option value="common">Обычный товар</option>
            <option value="popular">★ Популярное</option>
        </select>
        <button onclick="addProduct()">ОПУБЛИКОВАТЬ</button>
    </div>

    <div class="product-grid" id="productGrid">
        </div>
</div>

<script>
    let currentUser = null;
    let isRegMode = false;
    let currentResizedImage = null; // Сюда сохраняем сжатое фото

    // ЗАГЛУШКА: Картинка, если фото не загрузили
    const NO_IMG = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0Ij48cGF0aCBkPSJNMjIgMkgydjIwaDIwVjJ6TTQgMjBoMTZWMkh0djE4ek04LjUgOC41Yy44MjggMCAxLjUtLjY3MiAxLjUtMS41cy0uNjcyLTEuNS0xLjUtMS41SDEuNWMtLjgyOCAwLTEuNS42NzItMS41IDEuNXMuNjcyIDEuNSAxLjUgMS41ek03IDE3bC0zLTQuN2w0LTNMMTAgMTNsMi41LTMuM2w0LjUgNUg3eiIgZmlsbD0iIzMzMyIvPjwvc3ZnPg==";

    // --- 1. Работа с изображениями (Сжатие) ---
    function processImage(input) {
        const file = input.files[0];
        const statusSpan = document.getElementById('file-status');
        
        if (!file) {
            currentResizedImage = null;
            statusSpan.innerText = "";
            return;
        }

        if (file.size > 10 * 1024 * 1024) { // 10MB limit
            alert("Файл слишком большой. Максимум 10МБ.");
            input.value = "";
            return;
        }

        statusSpan.innerText = "Сжатие...";

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = function (event) {
            const img = new Image();
            img.src = event.target.result;
            img.onload = function () {
                // Логика сжатия
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 600; // Максимальная ширина картинки на сайте
                let width = img.width;
                let height = img.height;

                if (width > MAX_WIDTH) {
                    height = (height * MAX_WIDTH) / width;
                    width = MAX_WIDTH;
                }

                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                // Преобразуем в JPG с качеством 0.7 (сильно экономит место)
                currentResizedImage = canvas.toDataURL('image/jpeg', 0.7);
                statusSpan.innerText = "Готово ✓";
                statusSpan.style.color = "#4caf50";
            };
        };
    }


    // --- 2. Логика Авторизации (из прошлого задания) ---
    function toggleAuthMode() {
        isRegMode = !isRegMode;
        document.getElementById('auth-title').innerText = isRegMode ? "РЕГИСТРАЦИЯ" : "ВХОД";
        document.getElementById('auth-toggle-text').innerText = isRegMode ? "Уже есть аккаунт? Войти" : "Нет аккаунта? Регистрация";
    }

    function handleAuth() {
        const login = document.getElementById('loginField').value.trim();
        const pass = document.getElementById('passField').value.trim();
        if(!login || !pass) return alert("Заполни поля");
        let users = JSON.parse(localStorage.getItem('users')) || [];

        if(isRegMode) {
            if(users.find(u => u.login === login)) return alert("Логин занят");
            users.push({ login, pass, role: (login === 'kybiiiuh' ? 'admin' : 'user') });
            localStorage.setItem('users', JSON.stringify(users));
            alert("Успех! Теперь войдите."); toggleAuthMode();
        } else {
            const user = users.find(u => u.login === login && u.pass === pass);
            if(user) loginSuccess(user); else alert("Ошибка входа");
        }
    }

    function loginSuccess(user) {
        currentUser = user;
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('userDisplay').innerText = `ROLE: ${user.role.toUpperCase()} | ${user.login}`;
        if(user.role === 'admin') document.getElementById('admin-panel').style.display = 'block';
        renderProducts();
    }

    function logout() { location.reload(); }

    // --- 3. Логика Товаров (CRUD с Image) ---
    let products = JSON.parse(localStorage.getItem('shop_items_v2')) || [];

    function addProduct() {
        const name = document.getElementById('pName').value.trim();
        const price = document.getElementById('pPrice').value;
        const desc = document.getElementById('pDesc').value.trim();
        const cat = document.getElementById('pCat').value;

        if(!name || !price) return alert("Имя и Цена обязательны!");

        const newItem = {
            id: Date.now(),
            name,
            price,
            desc,
            cat,
            // Используем сжатое фото, или заглушку
            image: currentResizedImage || NO_IMG 
        };

        try {
            products.push(newItem);
            localStorage.setItem('shop_items_v2', JSON.stringify(products));
            
            // Очистка формы
            document.getElementById('pName').value = '';
            document.getElementById('pPrice').value = '';
            document.getElementById('pDesc').value = '';
            document.getElementById('pImage').value = '';
            document.getElementById('file-status').innerText = "";
            currentResizedImage = null;

            renderProducts();
        } catch (e) {
            // Если localStorage переполнен даже со сжатием
            alert("Ошибка: Память браузера переполнена. Попробуйте загрузить изображение поменьше или удалить старые товары.");
            products.pop(); // Откатываем добавление
        }
    }

    function deleteItem(id) {
        if(!confirm("Удалить этот товар?")) return;
        products = products.filter(p => p.id !== id);
        localStorage.setItem('shop_items_v2', JSON.stringify(products));
        renderProducts();
    }

    function renderProducts() {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = '';
        
        if(products.length === 0) {
            grid.innerHTML = '<p style="color:#333; grid-column: 1/-1; text-align:center;">Ассортимент пуст...</p>';
            return;
        }

        products.forEach(p => {
            const isAdmin = currentUser && currentUser.role === 'admin';
            
            grid.innerHTML += `
                <div class="card">
                    ${p.cat === 'popular' ? '<div class="pop-badge">★ POP</div>' : ''}
                    <div class="card-img-wrapper">
                        <img src="${p.image}" class="card-img" alt="${p.name}">
                    </div>
                    <div class="card-content">
                        <div>
                            <h3 class="card-title">${p.name}</h3>
                            <p class="card-desc">${p.desc}</p>
                        </div>
                        <div>
                            <p class="card-price">${Number(p.price).toLocaleString('ru-RU')} KZT</p>
                            <button onclick="alert('Товар добавлен в корзину')">В КОРЗИНУ</button>
                            ${isAdmin ? `<button onclick="deleteItem(${p.id})" class="btn-del">УДАЛИТЬ АДМИН</button>` : ''}
                        </div>
                    </div>
                </div>
            `;
        });
    }

    // Интерфейс
    function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); }
    function toggleSub(id) {
        let el = document.getElementById(id);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }
</script>

</body>
</html>
