<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QB IRRITATED</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#000;color:#fff;}

/* HEADER */
header{
position:fixed;
width:100%;
display:flex;
justify-content:space-between;
padding:20px;
background:rgba(0,0,0,0.6);
z-index:10;
}
.logo{letter-spacing:5px;font-weight:bold;}

/* HERO */
.hero{
height:80vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}
.hero h1{font-size:50px;letter-spacing:10px;}
.hero p{color:#777;margin-top:10px;}

/* PRODUCTS */
.products{
padding:20px;
display:grid;
gap:40px;
}

.card{
border:1px solid #111;
padding:15px;
}

.card img{
width:100%;
height:300px;
object-fit:cover;
}

h3{margin-top:10px;}

select,input{
width:100%;
margin-top:10px;
padding:10px;
background:#111;
color:white;
border:none;
}

button{
margin-top:10px;
padding:10px;
background:white;
color:black;
border:none;
font-weight:bold;
width:100%;
cursor:pointer;
}

/* SOCIAL */
.socials{
text-align:center;
padding:30px;
}

.socials a{
margin:0 10px;
color:#aaa;
text-decoration:none;
}

footer{
text-align:center;
padding:20px;
font-size:12px;
color:#555;
}
</style>
</head>

<body>

<header>
<div class="logo">QB IRRITATED</div>
</header>

<section class="hero">
<h1>QB IRRITATED</h1>
<p>LIMITED DROP</p>
</section>

<section class="products">

<!-- ПАЦИЕНТ 1 -->
<div class="card">
<img src="https://picsum.photos/800/800?random=1">

<h3>ZIP HOODIE “ПАЦИЕНТ 1” — $32</h3>

<select class="size">
<option value="">Выбери размер</option>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<input type="text" class="name" placeholder="Твоё имя">
<input type="text" class="city" placeholder="Город">

<button onclick="order(this,'ПАЦИЕНТ 1')">ORDER</button>
</div>

<!-- ПАЦИЕНТ ? -->
<div class="card">
<img src="https://picsum.photos/800/800?random=2">

<h3>ZIP HOODIE “ПАЦИЕНТ ?” — $32</h3>

<select class="size">
<option value="">Выбери размер</option>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<input type="text" class="name" placeholder="Твоё имя">
<input type="text" class="city" placeholder="Город">

<button onclick="order(this,'ПАЦИЕНТ ?')">ORDER</button>
</div>

  <!-- ФУТБОЛКА -->
<div class="card">
<img src="https://picsum.photos/800/800?random=3">

<h3>T-SHIRTS “Пациент 1” — $22</h3>

<select class="size">
<option value="">Выбери размер</option>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<input type="text" class="name" placeholder="Твоё имя">
<input type="text" class="city" placeholder="Город">

<button onclick="order(this,'ФУТБОЛКА QB BASIC')">ORDER</button>
</div>

</section>

<div class="socials">
<a href="https://t.me/irritateds" target="_blank">TELEGRAM</a>
<a href="https://tiktok.com/irritatedly" target="_blank">TIKTOK</a>
</div>

<footer>QB IRRITATED © 2026</footer>

<script>

function order(button, product){

let card = button.parentElement;

let size = card.querySelector(".size").value;
let name = card.querySelector(".name").value;
let city = card.querySelector(".city").value;

if(size=="" || name=="" || city==""){
alert("Заполни все поля");
return;
}

let text = `Заказ QB IRRITATED:%0AТовар: ${product}%0AРазмер: ${size}%0AИмя: ${name}%0AГород: ${city}`;

window.open(`https://t.me/kybiiiuh?text=${text}`, "_blank");

}

</script>

</body>
</html>
