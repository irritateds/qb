<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QB Irritated</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0b0b0b;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
border-bottom:1px solid #222;
}

.logo{
font-size:22px;
font-weight:bold;
letter-spacing:3px;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
font-size:14px;
opacity:0.8;
}

.hero{
height:60vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:linear-gradient(black,#111);
}

.hero h1{
font-size:40px;
letter-spacing:5px;
}

.products{
padding:30px;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:#111;
border-radius:10px;
overflow:hidden;
}

.card img{
width:100%;
}

.card p{
padding:10px;
font-size:14px;
}

button{
width:100%;
padding:10px;
border:none;
background:white;
color:black;
font-weight:bold;
}

footer{
margin-top:40px;
padding:20px;
text-align:center;
border-top:1px solid #222;
font-size:12px;
opacity:0.6;
}

</style>
</head>

<body>

<header>
<div class="logo">QB IRRITATED</div>
<nav>
<a href="#">Shop</a>
<a href="#">About</a>
<a href="#">Instagram</a>
</nav>
</header>

<section class="hero">
<h1>NEW DROP</h1>
</section>

<section class="products">

<div class="card">
<img src="https://picsum.photos/400/400?1">
<p>Gothic Hoodie</p>
<button>Buy</button>
</div>

<div class="card">
<img src="https://picsum.photos/400/400?2">
<p>Street Mask Hoodie</p>
<button>Buy</button>
</div>

<div class="card">
<img src="https://picsum.photos/400/400?3">
<p>Oversized Tee</p>
<button>Buy</button>
</div>

<div class="card">
<img src="https://picsum.photos/400/400?4">
<p>Dark Pants</p>
<button>Buy</button>
</div>

</section>

<footer>
QB IRRITATED © 2026
</footer>

</body>
</html>
