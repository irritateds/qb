<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QB IRRITATED</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#000;color:#fff;}

/* HEADER */
header{
position:fixed;
width:100%;
display:flex;
justify-content:center;
padding:20px;
background:rgba(0,0,0,0.6);
z-index:10;
}
.logo{letter-spacing:6px;font-size:14px;}

/* HERO */
.hero{
height:70vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}
.hero h1{
font-size:48px;
letter-spacing:10px;
}
.hero p{
color:#777;
margin-top:10px;
}

/* PRODUCT */
.product{
display:flex;
flex-direction:column;
padding:20px;
margin-bottom:60px;
border-top:1px solid #111;
}

/* GALLERY */
.gallery img{
width:100%;
height:auto;
}

.thumbs{
display:flex;
gap:10px;
margin-top:10px;
}

.thumbs img{
width:70px;
opacity:0.5;
cursor:pointer;
}

.thumbs img:hover{
opacity:1;
}

/* INFO */
.info{
margin-top:20px;
}

.info h2{
letter-spacing:4px;
}

.price{
color:#aaa;
margin:10px 0;
}

/* FORM */
select,input{
width:100%;
margin-top:10px;
padding:12px;
background:#111;
color:white;
border:none;
}

button{
margin-top:15px;
padding:14px;
background:white;
color:black;
border:none;
font-weight:bold;
width:100%;
cursor:pointer;
}

/* SOCIAL */
.socials{
text-align:center;
padding:30px;
}

.socials a{
margin:0 10px;
color:#777;
text-decoration:none;
font-size:12px;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
font-size:12px;
color:#444;
}

</style>
</head>

<body>

<header>
<div class="logo">QB IRRITATED</div>
</header>

<section class="hero">
<h1>QB IRRITATED</h1>
<p>LIMITED DROP</p>
</section>

<!-- ПАЦИЕНТ 1 -->
<section class="product">

<div class="gallery">
<img id="main1" src="IMG_0245.jpeg">

<div class="thumbs">
<img src="IMG_0245.jpeg" onclick="changeImage('main1', this.src)">
<img src="IMG_0244.jpeg" onclick="changeImage('main1', this.src)">
</div>
</div>

<div class="info">
<h2>ПАЦИЕНТ 1</h2>
<div class="price">$32</div>

<select class="size">
<option value="">Размер</option>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<input type="text" class="name" placeholder="Имя">
<input type="text" class="city" placeholder="Город">

<button onclick="order(this,'ПАЦИЕНТ 1')">ORDER</button>
</div>

</section>

<!-- ПАЦИЕНТ ? -->
<section class="product">

<div class="gallery">
<img id="main2" src="IMG_0241.jpeg">
</div>

<div class="info">
<h2>ПАЦИЕНТ ?</h2>
<div class="price">$32</div>

<select class="size">
<option value="">Размер</option>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<input type="text" class="name" placeholder="Имя">
<input type="text" class="city" placeholder="Город">

<button onclick="order(this,'ПАЦИЕНТ ?')">ORDER</button>
</div>

</section>

<div class="socials">
<a href="https://t.me/irritateds" target="_blank">TELEGRAM</a>
<a href="https://www.tiktok.com/@irritatedly?_r=1&_t=ZS-95bjHn2eAYm" target="_blank">TIKTOK</a>
</div>

<footer>QB IRRITATED © 2026</footer>

<script>

function changeImage(id, src){
document.getElementById(id).src = src;
}

function order(button, product){

let card = button.parentElement;

let size = card.querySelector(".size").value;
let name = card.querySelector(".name").value;
let city = card.querySelector(".city").value;

if(size=="" || name=="" || city==""){
alert("Заполни все поля");
return;
}

let text = `Заказ QB IRRITATED:%0AТовар: ${product}%0AРазмер: ${size}%0AИмя: ${name}%0AГород: ${city}`;

window.open(`https://t.me/kybiiiuh?text=${text}`, "_blank");

}

</script>

</body>
</html>
